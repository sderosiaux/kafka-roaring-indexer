<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRI Explorer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { brand: '#5b21b6' }
    }
  }
}
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
  .bar { transition: width 0.3s ease; }
  .result-glow { box-shadow: 0 0 0 3px rgba(91,33,182,0.15); }
  input, select { outline: none; }
  input:focus, select:focus { box-shadow: 0 0 0 2px rgba(91,33,182,0.4); }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-3">
  <svg class="w-6 h-6 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
  </svg>
  <h1 class="text-lg font-semibold text-gray-900">KRI Explorer</h1>
  <span class="text-xs text-gray-400 ml-1">kafka-roaring-indexer</span>
  <div class="ml-auto flex items-center gap-2">
    <span id="health-dot" class="w-2 h-2 rounded-full bg-gray-300"></span>
    <span id="health-label" class="text-xs text-gray-500">connecting…</span>
  </div>
</header>

<div class="max-w-7xl mx-auto p-6 space-y-5">

  <!-- Controls row -->
  <div class="bg-white rounded-xl border border-gray-200 p-5">
    <div class="grid grid-cols-12 gap-4 items-end">

      <!-- From -->
      <div class="col-span-3">
        <label class="block text-xs font-medium text-gray-500 mb-1">From</label>
        <input id="inp-from" type="text" placeholder="2026-04-24T00:00:00Z"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
      </div>

      <!-- To -->
      <div class="col-span-3">
        <label class="block text-xs font-medium text-gray-500 mb-1">To</label>
        <input id="inp-to" type="text" placeholder="2026-04-24T06:00:00Z"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
      </div>

      <!-- Filter -->
      <div class="col-span-3">
        <label class="block text-xs font-medium text-gray-500 mb-1">Filter
          <span class="text-gray-400 font-normal">(e.g. country:FR AND device:mobile)</span>
        </label>
        <input id="inp-filter" type="text" placeholder="country:FR AND NOT status:500"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono">
      </div>

      <!-- Agg -->
      <div class="col-span-2">
        <label class="block text-xs font-medium text-gray-500 mb-1">Aggregation</label>
        <select id="inp-agg" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
          <option value="cardinality">cardinality</option>
          <option value="count">count</option>
          <option value="distinctUsers">distinctUsers</option>
          <option value="totalLatencyMs">totalLatencyMs</option>
          <option value="requestCount">requestCount</option>
        </select>
      </div>

      <!-- Execute -->
      <div class="col-span-1">
        <button id="btn-run"
          class="w-full bg-brand hover:bg-violet-700 text-white font-medium text-sm rounded-lg px-4 py-2 transition-colors">
          Run
        </button>
      </div>

    </div>

    <!-- Partitions (optional) -->
    <div class="mt-3 flex items-center gap-3">
      <label class="text-xs font-medium text-gray-500">Partitions</label>
      <input id="inp-partitions" type="text" placeholder="all (e.g. 0,1,2)"
        class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm w-48">
      <span class="text-xs text-gray-400">leave blank for all</span>
    </div>
  </div>

  <!-- Results + Facets -->
  <div class="grid grid-cols-12 gap-5">

    <!-- Query result card -->
    <div class="col-span-4">
      <div id="result-card" class="bg-white rounded-xl border border-gray-200 p-5 h-full">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-4">Result</p>
        <div id="result-empty" class="text-gray-400 text-sm mt-4">Run a query to see results.</div>
        <div id="result-data" class="hidden">
          <div class="text-5xl font-bold text-brand mb-2" id="r-value">—</div>
          <div class="text-sm text-gray-500 mb-4" id="r-metric"></div>
          <div class="space-y-1 text-sm">
            <div class="flex justify-between">
              <span class="text-gray-500">Matched records</span>
              <span class="font-mono font-medium" id="r-matched">—</span>
            </div>
            <div class="flex justify-between">
              <span class="text-gray-500">Segments scanned</span>
              <span class="font-mono font-medium" id="r-segments">—</span>
            </div>
            <div class="flex justify-between">
              <span class="text-gray-500">Approximate?</span>
              <span class="font-mono font-medium" id="r-approx">—</span>
            </div>
          </div>
        </div>
        <div id="result-error" class="hidden text-red-600 text-sm mt-2"></div>
        <div id="result-loading" class="hidden">
          <div class="flex items-center gap-2 text-gray-400 text-sm">
            <svg class="spin w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-dasharray="30 70"/>
            </svg>
            Running…
          </div>
        </div>
      </div>
    </div>

    <!-- Facets -->
    <div class="col-span-8">
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <div class="flex items-center justify-between mb-4">
          <p class="text-xs font-medium text-gray-400 uppercase tracking-wide">Facets</p>
          <div class="flex items-center gap-2">
            <label class="text-xs text-gray-500">Top</label>
            <select id="inp-topN" class="border border-gray-200 rounded px-2 py-1 text-xs bg-white">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="50">50</option>
            </select>
          </div>
        </div>
        <div id="facets-empty" class="text-gray-400 text-sm">Run a query to see facets.</div>
        <div id="facets-loading" class="hidden flex items-center gap-2 text-gray-400 text-sm">
          <svg class="spin w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-dasharray="30 70"/>
          </svg>
          Loading facets…
        </div>
        <div id="facets-data" class="hidden space-y-5"></div>
        <div id="facets-error" class="hidden text-red-600 text-sm"></div>
      </div>
    </div>
  </div>

  <!-- Segments table -->
  <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
    <div class="flex items-center justify-between px-5 py-3 border-b border-gray-100">
      <p class="text-xs font-medium text-gray-400 uppercase tracking-wide">Segments</p>
      <button id="btn-refresh-segs"
        class="text-xs text-violet-600 hover:text-violet-800 font-medium">Refresh</button>
    </div>
    <div id="segs-empty" class="px-5 py-4 text-gray-400 text-sm">No segments.</div>
    <table id="segs-table" class="hidden w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">ID</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">Partition</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">Start</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">End</th>
          <th class="px-4 py-2 text-right text-xs font-medium text-gray-500">Records</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">State</th>
          <th class="px-4 py-2 text-left text-xs font-medium text-gray-500">Dims</th>
        </tr>
      </thead>
      <tbody id="segs-body" class="divide-y divide-gray-50"></tbody>
    </table>
  </div>

</div>

<script>
const API = '';  // same origin

function fmt(n) {
  if (n == null || n === -1) return '—';
  if (typeof n === 'number') {
    if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2) + 'M';
    if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1) + 'k';
    return n.toLocaleString();
  }
  return String(n);
}

function fmtTs(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toISOString().replace('T', ' ').replace('.000Z', 'Z');
}

// ── health check ──────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    const dot = document.getElementById('health-dot');
    const label = document.getElementById('health-label');
    if (r.ok) {
      dot.className = 'w-2 h-2 rounded-full bg-green-400';
      label.textContent = 'connected';
      label.className = 'text-xs text-green-600';
    } else {
      throw new Error(r.status);
    }
  } catch {
    document.getElementById('health-dot').className = 'w-2 h-2 rounded-full bg-red-400';
    document.getElementById('health-label').textContent = 'unreachable';
    document.getElementById('health-label').className = 'text-xs text-red-500';
  }
}

// ── segments ──────────────────────────────────────────────────────────────────
async function loadSegments() {
  try {
    const r = await fetch(API + '/segments');
    const segs = await r.json();
    const body = document.getElementById('segs-body');
    body.innerHTML = '';
    if (!segs || segs.length === 0) {
      document.getElementById('segs-empty').classList.remove('hidden');
      document.getElementById('segs-table').classList.add('hidden');
      return;
    }
    document.getElementById('segs-empty').classList.add('hidden');
    document.getElementById('segs-table').classList.remove('hidden');
    segs.forEach(s => {
      const dims = Object.entries(s.dims || {}).map(([d,c]) => `${d}(${c})`).join(' ');
      const frozen = s.frozen
        ? '<span class="text-green-600 font-medium">frozen</span>'
        : '<span class="text-amber-500 font-medium">open</span>';
      body.innerHTML += `<tr class="hover:bg-gray-50">
        <td class="px-4 py-2 font-mono text-gray-500">${s.id}</td>
        <td class="px-4 py-2 font-mono">${s.partition}</td>
        <td class="px-4 py-2 text-gray-600">${fmtTs(s.tStart)}</td>
        <td class="px-4 py-2 text-gray-600">${fmtTs(s.tEnd)}</td>
        <td class="px-4 py-2 font-mono text-right">${fmt(s.recordCount)}</td>
        <td class="px-4 py-2">${frozen}</td>
        <td class="px-4 py-2 text-xs text-gray-400">${dims}</td>
      </tr>`;
    });
  } catch(e) {
    console.error('segments error', e);
  }
}

// ── facets ────────────────────────────────────────────────────────────────────
async function loadFacets(params) {
  const facetsData = document.getElementById('facets-data');
  const facetsEmpty = document.getElementById('facets-empty');
  const facetsLoading = document.getElementById('facets-loading');
  const facetsError = document.getElementById('facets-error');

  facetsEmpty.classList.add('hidden');
  facetsData.classList.add('hidden');
  facetsError.classList.add('hidden');
  facetsLoading.classList.remove('hidden');

  try {
    const qs = new URLSearchParams(params);
    const r = await fetch(API + '/facets?' + qs.toString());
    const data = await r.json();
    facetsLoading.classList.add('hidden');
    if (data.error) {
      facetsError.textContent = data.error;
      facetsError.classList.remove('hidden');
      return;
    }
    const facets = data.facets || {};
    const dims = Object.keys(facets);
    if (dims.length === 0) {
      facetsEmpty.textContent = 'No facets available.';
      facetsEmpty.classList.remove('hidden');
      return;
    }
    facetsData.innerHTML = '';
    dims.forEach(dim => {
      const values = facets[dim] || [];
      if (values.length === 0) return;
      const max = values[0].count;
      const rows = values.map(v => {
        const pct = max > 0 ? Math.round((v.count / max) * 100) : 0;
        return `<div class="flex items-center gap-2 group cursor-pointer hover:bg-gray-50 -mx-2 px-2 py-0.5 rounded"
              onclick="applyFilter('${dim}', '${String(v.value).replace(/'/g,"\\'")}')">
          <span class="text-xs font-mono text-gray-700 w-32 truncate shrink-0" title="${v.value}">${v.value}</span>
          <div class="flex-1 bg-gray-100 rounded-full h-2 overflow-hidden">
            <div class="bar bg-violet-400 h-2 rounded-full" style="width:${pct}%"></div>
          </div>
          <span class="text-xs font-mono text-gray-500 w-16 text-right shrink-0">${fmt(v.count)}</span>
        </div>`;
      }).join('');
      facetsData.innerHTML += `<div>
        <p class="text-xs font-semibold text-gray-600 mb-1.5">${dim}</p>
        <div class="space-y-0.5">${rows}</div>
      </div>`;
    });
    facetsData.classList.remove('hidden');
  } catch(e) {
    facetsLoading.classList.add('hidden');
    facetsError.textContent = String(e);
    facetsError.classList.remove('hidden');
  }
}

// ── query ─────────────────────────────────────────────────────────────────────
async function runQuery() {
  const from = document.getElementById('inp-from').value.trim();
  const to = document.getElementById('inp-to').value.trim();
  const filter = document.getElementById('inp-filter').value.trim();
  const agg = document.getElementById('inp-agg').value;
  const partitions = document.getElementById('inp-partitions').value.trim();
  const topN = document.getElementById('inp-topN').value;

  const params = {};
  if (from) params.from = from;
  if (to) params.to = to;
  if (filter) params.filter = filter;
  if (agg) params.agg = agg;
  if (partitions) params.partitions = partitions;

  // Show loading
  document.getElementById('result-empty').classList.add('hidden');
  document.getElementById('result-data').classList.add('hidden');
  document.getElementById('result-error').classList.add('hidden');
  document.getElementById('result-loading').classList.remove('hidden');

  try {
    const qs = new URLSearchParams(params);
    const r = await fetch(API + '/query?' + qs.toString());
    const data = await r.json();
    document.getElementById('result-loading').classList.add('hidden');

    if (data.error) {
      document.getElementById('result-error').textContent = data.error;
      document.getElementById('result-error').classList.remove('hidden');
      return;
    }

    const val = data.result;
    document.getElementById('r-value').textContent =
      typeof val === 'number'
        ? (Number.isInteger(val) ? fmt(val) : val.toFixed(0) + (data.approx ? '~' : ''))
        : String(val);
    document.getElementById('r-metric').textContent = data.metric;
    document.getElementById('r-matched').textContent = fmt(data.matched);
    document.getElementById('r-segments').textContent = data.segments;
    document.getElementById('r-approx').textContent = data.approx ? 'yes (~0.8%)' : 'no';
    document.getElementById('result-data').classList.remove('hidden');
  } catch(e) {
    document.getElementById('result-loading').classList.add('hidden');
    document.getElementById('result-error').textContent = String(e);
    document.getElementById('result-error').classList.remove('hidden');
  }

  // Also load facets with same params
  const facetParams = { ...params, topN };
  delete facetParams.agg;
  loadFacets(facetParams);
}

// ── filter shortcut from facet click ─────────────────────────────────────────
function applyFilter(dim, value) {
  const inp = document.getElementById('inp-filter');
  const cur = inp.value.trim();
  const clause = `${dim}:${value}`;
  inp.value = cur ? `${cur} AND ${clause}` : clause;
  runQuery();
}

// ── pre-fill dates ────────────────────────────────────────────────────────────
function prefillDates() {
  const now = new Date();
  const to = now.toISOString().replace(/\.\d+Z$/, 'Z');
  const from = new Date(now.getTime() - 6 * 3600 * 1000).toISOString().replace(/\.\d+Z$/, 'Z');
  document.getElementById('inp-from').value = from;
  document.getElementById('inp-to').value = to;
}

// ── init ──────────────────────────────────────────────────────────────────────
prefillDates();
checkHealth();
loadSegments();
setInterval(checkHealth, 30_000);

document.getElementById('btn-run').addEventListener('click', runQuery);
document.getElementById('btn-refresh-segs').addEventListener('click', loadSegments);
document.getElementById('inp-filter').addEventListener('keydown', e => {
  if (e.key === 'Enter') runQuery();
});
</script>

</body>
</html>
