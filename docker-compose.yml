services:
  pod1:
    build: .
    command: ["--events", "50000", "--serve", "--port", "8081", "--buckets", "12"]
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  pod2:
    build: .
    command: ["--events", "50000", "--serve", "--port", "8082", "--buckets", "12"]
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  coordinator:
    build: .
    command:
      - "--events"
      - "0"
      - "--serve"
      - "--port"
      - "8080"
      - "--peers"
      - "http://pod1:8081,http://pod2:8082"
    ports:
      - "8080:8080"
    depends_on:
      pod1:
        condition: service_healthy
      pod2:
        condition: service_healthy
